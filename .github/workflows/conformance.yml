name: OpenVX Conformance Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libgtest-dev libopencv-dev python3 python3-pip
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          rustc --version
          cargo --version
      - name: Build rustVX
        run: |
          source $HOME/.cargo/env
          cargo build --release
      - name: Build OpenVX CTS
        run: |
          cd OpenVX-cts
          mkdir -p include
          if [ -d "../include" ]; then
            cp -r ../include/* include/ 2>/dev/null || true
          fi
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_STANDARD_LIBRARIES="-lm" \
            -DCMAKE_CXX_STANDARD_LIBRARIES="-lm" \
            -DOPENVX_INCLUDES="${{ github.workspace }}/include;${{ github.workspace }}/OpenVX-cts/include" \
            -DOPENVX_LIBRARIES="${{ github.workspace }}/target/release/libopenvx_core.so;${{ github.workspace }}/target/release/libopenvx_ffi.so;m" \
            -DOPENVX_CONFORMANCE_VISION=ON
          make -j$(nproc)

  baseline:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libgtest-dev libopencv-dev python3 python3-pip
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      - name: Build rustVX
        run: |
          source $HOME/.cargo/env
          cargo build --release
      - name: Build OpenVX CTS
        run: |
          cd OpenVX-cts
          mkdir -p include
          if [ -d "../include" ]; then
            cp -r ../include/* include/ 2>/dev/null || true
          fi
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_STANDARD_LIBRARIES="-lm" \
            -DCMAKE_CXX_STANDARD_LIBRARIES="-lm" \
            -DOPENVX_INCLUDES="${{ github.workspace }}/include;${{ github.workspace }}/OpenVX-cts/include" \
            -DOPENVX_LIBRARIES="${{ github.workspace }}/target/release/libopenvx_core.so;${{ github.workspace }}/target/release/libopenvx_ffi.so;m" \
            -DOPENVX_CONFORMANCE_VISION=ON
          make -j$(nproc)
      - name: Run All Baseline Tests
        run: |
          cd OpenVX-cts/build
          export LD_LIBRARY_PATH=${{ github.workspace }}/target/release
          export VX_TEST_DATA_PATH=${{ github.workspace }}/OpenVX-cts/test_data/
          timeout 300 ./bin/vx_test_conformance --filter="SmokeTestBase.*:Scalar.*:Array.*:ObjectArray.*:GraphCallback.*:GraphDelay.*"

